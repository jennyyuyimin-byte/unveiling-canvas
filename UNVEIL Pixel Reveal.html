<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNVEIL — Pixel Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #ECE7DF; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  @keyframes ug-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ug-rise { from { transform: translateY(40px); opacity: .4; } to { transform: translateY(0); opacity: 1; } }
  @keyframes ug-pop { 0% { transform: scale(.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes ug-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes ug-reveal { 0% { opacity: .9; transform: scale(1); } 100% { opacity: 0; transform: scale(1.15); } }
  @keyframes ug-spin { to { transform: rotate(360deg); } }
  .ug-spin { animation: ug-spin .7s linear infinite; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/design-canvas.jsx"></script>
<script type="text/babel" src="game-icons.jsx"></script>
<script type="text/babel" src="game-engine.jsx"></script>
<script type="text/babel" src="game-actions.jsx"></script>
<script type="text/babel" src="game-sheets.jsx"></script>
<script type="text/babel" src="game-app.jsx"></script>

<script type="text/babel" data-presets="react">
  function Phone({ themeId }) {
    const t = window.THEMES[themeId];
    return (
      <window.IOSDevice dark={t.deviceDark}>
        <window.GameApp themeId={themeId} instanceId={themeId} />
      </window.IOSDevice>
    );
  }

  function Root() {
    return (
      <window.DesignCanvas>
        <window.DCSection id="dir" title="UNVEIL · Arcade"
          subtitle="The chosen direction — bright & playful, now wrapped around the new painting. Tap a square to buy & reveal it. Click ⤢ to play fullscreen. (Cosmic kept alongside as a saved alternate.)">
          <window.DCArtboard id="arcade" label="B · Arcade — the pick, new painting" width={402} height={874}>
            <Phone themeId="arcade" />
          </window.DCArtboard>
          <window.DCArtboard id="cosmic" label="A · Cosmic — saved alternate (original art)" width={402} height={874}>
            <Phone themeId="cosmic" />
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>
    );
  }

  function mount() {
    if (!(window.DesignCanvas && window.GameApp && window.IOSDevice)) { setTimeout(mount, 40); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  }
  mount();
</script>
</body>
</html>
